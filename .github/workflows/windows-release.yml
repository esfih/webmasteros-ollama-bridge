name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Windows executable and installer
        shell: pwsh
        run: |
          pwsh -File .\packaging\windows\build-windows-bridge.ps1 -ProjectRoot $PWD -BuildInstaller

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webmasteros-ollama-bridge-windows
          path: |
            dist/windows/WebmasterOSOllamaBridge.exe
            dist/windows/stage/**
            dist/windows/installer/**

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/WebmasterOSOllamaBridge.exe
            dist/windows/installer/WebmasterOSOllamaBridge-Setup.exe
          generate_release_notes: true
